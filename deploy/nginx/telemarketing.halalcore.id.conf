# telemarketing.halalcore.id — Telemarketing Portal (static files served by Nginx)
# Place in /etc/nginx/sites-available/telemarketing.halalcore.id.conf

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name telemarketing.halalcore.id;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name telemarketing.halalcore.id;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/halalcore.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/halalcore.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root — static files from Vite build
    root /var/www/telemarketing.halalcore.id;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Cache hashed static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(?:png|jpg|jpeg|gif|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA fallback — all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
}
