openapi: 3.0.3
info:
  title: Ana Nahnu API
  description: API Documentation for Ana Nahnu web applications (Backend, Telemarketing, Frontend).
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local Development Server
paths:
  /ping:
    get:
      summary: Health check endpoint
      description: Returns a simple ping response to verify the server status.
      responses:
        '200':
          description: Server is healthy and running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong

  /auth/login:
    post:
      summary: User Login
      description: Authenticate a user and return access/refresh tokens.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@ananahnu.id
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid input parameters
        '401':
          description: Unauthorized (Invalid credentials)

  /auth/register:
    post:
      summary: User Register
      description: Register a new client or generic user account.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: account registered successfully
        '400':
          description: Registration failed (e.g. email exists or validation error)

  /auth/forgot-password:
    post:
      summary: Forgot Password
      description: Request a password reset link to be sent via email.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
      responses:
        '200':
          description: Password reset request accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If that email is registered, a reset link has been sent.

  /auth/reset-password:
    post:
      summary: Reset Password
      description: Reset the password using a valid reset token.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - new_password
              properties:
                token:
                  type: string
                  example: super-secret-token-string
                new_password:
                  type: string
                  minLength: 6
                  example: newsecurepassword123
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: password updated
        '400':
          description: Invalid token or password format

  /auth/facilitators:
    get:
      summary: List Facilitators
      description: Returns a list of all facilitators / halal advisors.
      tags:
        - Authentication
      responses:
        '200':
          description: List of facilitators retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserShort'

  /admin/users/generate:
    post:
      summary: Generate Account (Admin only)
      description: Generates a new user account with a temporary password (DIRECTOR role required).
      tags:
        - Administration
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - username
                - full_name
                - role_name
              properties:
                email:
                  type: string
                  format: email
                  example: marketing@ananahnu.id
                username:
                  type: string
                  example: marketing1
                full_name:
                  type: string
                  example: Ahmad Marketing
                role_name:
                  type: string
                  example: MARKETING
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: account created
                  password:
                    type: string
                    example: tempPassword123
        '400':
          description: Bad request (validation error)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Only DIRECTOR role allowed)

  /submissions:
    get:
      summary: Get Submissions
      description: Retrieve a list of submissions. Clients see their own submissions; admins/managers see submissions based on their roles.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: Filter submissions by status (e.g. DRAFT, SUBMITTED, APPROVED)
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Submission'
        '401':
          description: Unauthorized

  /submissions/draft:
    post:
      summary: Create Draft Submission
      description: Creates a basic submission in DRAFT status.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_type
              properties:
                client_id:
                  type: string
                  format: uuid
                  example: c1b1062b-e53b-4835-ab35-e11d21ad630c
                business_name:
                  type: string
                  example: Warung Sederhana Halal
                service_type:
                  type: string
                  enum: [REGULER, SELF_DECLARE]
                  example: REGULER
      responses:
        '201':
          description: Draft created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '400':
          description: Bad request

  /submissions/create-full:
    post:
      summary: Create Full Submission
      description: Creates a complete submission containing client information and initial files.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFullInput'
      responses:
        '201':
          description: Submission created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '400':
          description: Bad request

  /submissions/{id}:
    get:
      summary: Get Submission Detail
      description: Retrieve detailed information about a single submission.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          description: UUID of the submission
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detailed submission data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Submission'
        '403':
          description: Forbidden (Not authorized to view this submission)
        '404':
          description: Submission not found

    delete:
      summary: Delete Submission
      description: Delete a submission. Available to authorized users under certain states.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Submission deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: submission deleted successfully
        '400':
          description: Failed to delete

  /submissions/{id}/submit:
    post:
      summary: Submit Submission
      description: Updates submission status from DRAFT/revision status to SUBMITTED to start the workflow.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successfully submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: submitted
        '400':
          description: Action not allowed in current state

  /submissions/{id}/approve:
    post:
      summary: Approve Submission
      description: Approves the submission. For QC_OFFICER, can optionally assign a drafter in the request body.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                drafter_id:
                  type: string
                  format: uuid
                  example: 4a2408c1-6bfe-4c8d-ae67-fef219a12c1b
      responses:
        '200':
          description: Successfully approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: approved
        '400':
          description: Failed to approve

  /submissions/{id}/reject:
    post:
      summary: Reject / Request Revision on Submission
      description: Rejects the submission or sends it back to revision status with feedback note.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  example: Please fix the attached KTP. It is blurry.
      responses:
        '200':
          description: Successfully rejected / sent to revision
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: rejected
        '400':
          description: Failed to reject

  /submissions/{id}/issue-sh:
    post:
      summary: Issue Sertifikat Halal (SH)
      description: Finalize the submission by attaching the Halal Certificate URL.
      tags:
        - Submissions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sh_url
              properties:
                sh_url:
                  type: string
                  format: uri
                  example: https://example.com/uploads/sertifikat-123.pdf
      responses:
        '200':
          description: SH issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: SH issued successfully
        '400':
          description: Failed to issue SH

  /public/track/{tracking_number}:
    get:
      summary: Publicly Track Submission
      description: Retrieve safe tracking information for a submission without logging in.
      tags:
        - Public
      parameters:
        - name: tracking_number
          in: path
          required: true
          schema:
            type: string
            example: AN-10293
      responses:
        '200':
          description: Tracking information
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  business_name:
                    type: string
                  client_name:
                    type: string
                  status:
                    type: string
                  service_type:
                    type: string
                  sh_url:
                    type: string
                  updated_at:
                    type: string
                    format: date-time
                  tracking_no:
                    type: string
        '404':
          description: Submission not found

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: '#/components/schemas/UserShort'

    UserShort:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        full_name:
          type: string
        role:
          type: string
        referral_code:
          type: string
        phone:
          type: string

    RegisterInput:
      type: object
      required:
        - email
        - username
        - password
        - full_name
      properties:
        email:
          type: string
          format: email
          example: client@example.com
        username:
          type: string
          example: client_username
        password:
          type: string
          format: password
          example: securepassword123
        full_name:
          type: string
          example: John Client
        phone:
          type: string
          example: "08123456789"
        address:
          type: string
          example: Jl. Sudirman No 12
        province_id:
          type: integer
          example: 31
        regency_id:
          type: integer
          example: 3171
        referral_code:
          type: string
          example: BDI123

    CreateFullInput:
      type: object
      required:
        - client_name
        - email
        - phone
        - business_name
        - service_type
      properties:
        client_name:
          type: string
          example: Ahmad Client
        email:
          type: string
          format: email
          example: ahmad@example.com
        phone:
          type: string
          example: "08123456789"
        business_name:
          type: string
          example: Bakso Barokah
        service_type:
          type: string
          enum: [REGULER, SELF_DECLARE]
          example: REGULER
        province_id:
          type: integer
          example: 32
        regency_id:
          type: integer
          example: 3273
        district_id:
          type: integer
          example: 3273010
        address:
          type: string
          example: Jl. Merdeka No 10

    Submission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        tracking_number:
          type: string
        service_type:
          type: string
        status:
          type: string
        sh_url:
          type: string
        audit_date:
          type: string
          format: date-time
        audit_result_1_url:
          type: string
        audit_result_2_url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
